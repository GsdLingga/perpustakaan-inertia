name: perpustakaan

services:
    perpustakaan-nginx:
        image: nginx:latest
        container_name: perpustakaan_nginx
        depends_on:
            - perpustakaan-php-fpm
        ports:
            - 8090:80
        volumes:
            - ../../:/var/www/html
            - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:cached

    perpustakaan-php-fpm:
        build: ../php
        container_name: perpustakaan_php_fpm
        working_dir: /var/www/html
        depends_on:
            - perpustakaan-mysql
        volumes:
            - ../../:/var/www/html:cached
            - ../php/php.ini:/usr/local/etc/php/php.ini:cached

    perpustakaan-mysql:
        image: mysql:8.4.3
        container_name: perpustakaan_mysql
        environment:
            MYSQL_ROOT_PASSWORD: root
            TZ: Asia/Tokyo
        ports:
            - 3390:3306
        volumes:
            - perpustakaan-db-data:/var/lib/mysql:cached

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        environment:
            - PMA_ARBITRARY=1
            - PMA_HOSTS=perpustakaan-mysql
            - PMA_USER=root
            - PMA_PASSWORD=root
            - UPLOAD_LIMIT=1000000000
        container_name: perpustakaan_phpmyadmin
        depends_on:
            - perpustakaan-mysql
        ports:
            - 8890:80
        volumes:
            - '../phpmyadmin/sessions:/sessions'

volumes:
    perpustakaan-db-data:
        driver: local
